        <main class="sell__main">
            <form>
                <legend class="contact__title">Publica tu Articulo</legend>
                
                <div class="mb-3">
                    <label for="sell-img" class="form-label contact__txt">Foto del Producto</label>
                    <input type="file" class="form-control contact__input" id="sell-img" placeholder="John Doe">
                </div>
                
                <div class="mb-3">
                    <label for="sell-name" class="form-label contact__txt">Nombre del Producto</label>
                    <input type="email" class="form-control contact__input" id="sell-name" placeholder="johndoe@example.com">
                </div>
                
                <div class="mb-3">
                    <label for="sell-wear" class="form-label contact__txt">Estado</label>
                    <input type="text" class="form-control contact__input" id="sell-wear" placeholder="2901-15510011">
                </div>
                
                <div class="mb-3">
                    <label for="sell-price" class="form-label contact__txt">Precio</label>
                    <input type="text" class="form-control contact__input" id="sell-price" placeholder="14:00 a 15:00">
                </div>
                
                <div class="mb-3">
                    <label for="sell-description" class="form-label contact__txt">Descripcion</label>
                    <textarea class="form-control contact__textbox" id="sell-description" rows="3" placeholder="Contanos sobre tu producto!"></textarea>
                </div>
                
                <button type="submit" class="btn btn-secondary sell__button">Publicar</button>
            </form>
        </main>
